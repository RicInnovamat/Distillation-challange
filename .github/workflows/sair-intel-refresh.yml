name: SAIR intel refresh

on:
  schedule:
    # Every other day at 04:00 UTC (~08:00 Asia/Dubai). Drifts 1 day at month boundaries.
    - cron: '0 4 */2 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet requests python-dotenv

      - name: Fetch SAIR + Zulip and update Blog_data/
        env:
          ZULIP_EMAIL: ${{ secrets.ZULIP_EMAIL }}
          ZULIP_API_KEY: ${{ secrets.ZULIP_API_KEY }}
        run: python scripts/refresh_sair_intel.py

      - name: Open PR if changes
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sair-intel-refresh-${{ github.run_number }}
          base: main
          commit-message: "chore(intel): refresh SAIR community data"
          title: "SAIR community intel refresh"
          body: |
            Automated refresh of community intelligence from:

            - **Zulip** (`zulip.sair.foundation`) — new messages per topic appended to `Blog_data/*.json`
            - **SAIR contributor network** (`server-9527.sair.foundation`) — graph snapshot at `cheatsheets/sair_contributor_network_snapshot.json`

            Generated by `.github/workflows/sair-intel-refresh.yml` (run #${{ github.run_number }}).
          labels: automation
          delete-branch: true
