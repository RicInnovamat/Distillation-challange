models:
  gpt-oss-120b:
    provider: openrouter
    model_id: "openai/gpt-oss-120b"
    input_cost_per_1m: 0.039
    output_cost_per_1m: 0.19

  llama-3.3-70b:
    provider: openrouter
    model_id: "meta-llama/llama-3.3-70b-instruct"
    input_cost_per_1m: 0.10
    output_cost_per_1m: 0.32

  gemini-3.1-flash-lite:
    provider: openrouter
    model_id: "google/gemini-3.1-flash-lite-preview"
    input_cost_per_1m: 0.25
    output_cost_per_1m: 1.50

  grok-4.1-fast:
    provider: openrouter
    model_id: "x-ai/grok-4.1-fast"
    input_cost_per_1m: 0.20
    output_cost_per_1m: 0.50

defaults:
  temperature: 0.0
  max_tokens: 1024
  concurrency: 10
  openrouter_base_url: "https://openrouter.ai/api/v1"

datasets:
  normal: "Training_data/normal.jsonl"
  hard1: "Training_data/hard1.jsonl"
  hard2: "Training_data/hard2.jsonl"
  hard3: "Training_data/hard3.jsonl"
  community: "Extra_training_data/SAIRCommunityBench_v1.jsonl"
  hard5: "Extra_training_data/Hard5_order5.jsonl"
