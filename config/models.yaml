# Official SAIR evaluation models for the Equational Theories Stage 1 challenge.
# Seven models, as shown in the SAIR Playground. Each has one or two backends:
#   - openrouter: cloud inference via OpenRouter
#   - ollama:     local inference via ollama (omitted for closed models)
#
# Verify ollama model_ids before first local run: `ollama pull <model_id>`.

models:
  gpt-oss-120b:
    display_name: "OpenAI: gpt-oss-120b"
    openrouter:
      model_id: "openai/gpt-oss-120b"
      input_cost_per_1m: 0.039
      output_cost_per_1m: 0.190
    # 120B params — default GGUF is ~65GB, exceeds 64GB RAM
    params:
      temperature: 1.0    # reasoning models require temp=1
      max_tokens: 65536   # reasoning tokens count against limit; 32K too low
    # Applied only when --official-mode is set. Mirrors SAIR's
    # evaluation_models.json entry for gpt-oss-120b. Temperature is
    # deliberately excluded — --official-mode leaves temperature alone.
    official_params:
      provider: "deepinfra/bf16"
      reasoning_effort: "low"
      seed: 0
      max_tokens: 8192
      # Healthy bf16 alternatives for --official-fallbacks.
      fallback_providers: ["Chutes"]

  gemma-4-31b:
    display_name: "Google: Gemma 4 31B"
    openrouter:
      model_id: "google/gemma-4-31b-it"
      input_cost_per_1m: 0.140
      output_cost_per_1m: 0.400
    ollama:
      model_id: "gemma4:31b"
      num_ctx: 8192    # 8K — max observed usage is 5.4K tokens; saves 9GB KV cache vs 32K
    # Applied only when --official-mode is set.
    # reasoning_effort="low" is in SAIR's evaluation_models.json for this
    # model, but with 10KB cheatsheets the reasoning tokens fully exhaust
    # the 8192 budget before any visible content is emitted (content="",
    # finish_reason="length"). Temporarily disabled while we raise this
    # upstream; toggle back on if SAIR fixes the doubled-budget retry.
    official_params:
      provider: "novita/bf16"
      # reasoning_effort: "low"
      seed: 0
      max_tokens: 8192
      # Additional providers appended to provider.order when
      # --official-fallbacks is set. Novita has been in a persistent
      # "degraded" state (status=-2) with server_overload errors;
      # the bf16 alternatives (Parasail, Venice) absorb most of the load.
      # AkashML serves the same model at fp8 — meaningful quantization
      # divergence from strict SAIR spec (bf16), but the only healthy
      # fallback left when all three bf16 providers rate-limit at once.
      # Entries support `slug/quant` syntax so the quantizations filter
      # unions across providers.
      fallback_providers: ["Parasail", "Venice", "AkashML/fp8"]

  llama-3.3-70b:
    display_name: "Meta: Llama 3.3 70B Instruct"
    openrouter:
      model_id: "meta-llama/llama-3.3-70b-instruct"
      input_cost_per_1m: 0.100
      output_cost_per_1m: 0.320
    ollama:
      model_id: "llama3.3:70b"
      num_ctx: 16384   # 16K — model supports 128K but 70B weights + KV cache exceed 64GB RAM at higher ctx
    # Applied only when --official-mode is set. Llama has no reasoning
    # mode, so the official config sets reasoning_effort="none".
    official_params:
      provider: "deepinfra/fp8"
      reasoning_effort: "none"
      seed: 0
      max_tokens: 8192
      # Healthy fp8 alternatives for --official-fallbacks.
      fallback_providers: ["Inceptron", "AkashML", "Together"]

  deepseek-v3.2:
    display_name: "DeepSeek: DeepSeek V3.2"
    openrouter:
      model_id: "deepseek/deepseek-v3.2"
      input_cost_per_1m: 0.260
      output_cost_per_1m: 0.380
    # 671B MoE — too large for local inference (~350GB Q4)

  gpt-oss-20b:
    display_name: "OpenAI: gpt-oss-20b"
    openrouter:
      model_id: "openai/gpt-oss-20b"
      input_cost_per_1m: 0.030
      output_cost_per_1m: 0.110
    ollama:
      model_id: "gpt-oss:20b"
      num_ctx: 65536   # 65K — covers 100% of observed usage (max 35.7K); ~18.5GB total RAM
    params:
      temperature: 1.0    # reasoning models require temp=1
      max_tokens: 65536   # reasoning tokens count against limit; 32K too low

  gemini-3.1-flash-lite:
    display_name: "Google: Gemini 3.1 Flash Lite Preview"
    openrouter:
      model_id: "google/gemini-3.1-flash-lite-preview"
      input_cost_per_1m: 0.250
      output_cost_per_1m: 1.500
    # closed model — no ollama backend

  grok-4.1-fast:
    display_name: "xAI: Grok 4.1 Fast"
    openrouter:
      model_id: "x-ai/grok-4.1-fast"
      input_cost_per_1m: 0.200
      output_cost_per_1m: 0.500
    # closed model — no ollama backend

defaults:
  temperature: 0.0
  max_tokens: 32768
  concurrency: 10
  openrouter_base_url: "https://openrouter.ai/api/v1"
  ollama_base_url: "http://localhost:11434"

datasets:
  normal: "Training_data/normal.jsonl"
  hard1: "Training_data/hard1.jsonl"
  hard2: "Training_data/hard2.jsonl"
  hard3: "Training_data/hard3.jsonl"
  community: "Extra_training_data/SAIRCommunityBench_v1.jsonl"
  hard5: "Extra_training_data/Hard5_order5.jsonl"
